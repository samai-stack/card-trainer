    <title>Тренажёр английских слов</title>
    <script>
      // Разворачиваем путь, закодированный в public/404.html при прямом переходе по ссылке
      // (см. комментарий там) — восстанавливаем настоящий URL до того, как загрузится React
      ;(function () {
        var params = new URLSearchParams(location.search)
        var redirect = params.get('redirect')
        if (redirect) {
          var basePath = '/card-trainer/'
          history.replaceState(null, '', basePath + redirect)
        }
      })()
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
